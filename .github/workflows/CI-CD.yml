name: Deploy Full RAG Stack

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t aryanondock/regulatory-rag:latest ./Backend

      - name: Push Backend Image
        run: docker push aryanondock/regulatory-rag:latest

      - name: Build Frontend Image
        run: docker build -t aryanondock/rag-frontend:latest ./Frontend/frontend

      - name: Push Frontend Image
        run: docker push aryanondock/rag-frontend:latest

      - name: Deploy on EC2 via Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/ComplianceBrain-RAG
            docker compose pull
            docker compose up -d