name: Deploy RAG via Docker

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t aryanondock/regulatory-rag:latest ./Backend

      - name: Push Image
        run: docker push aryanondock/regulatory-rag:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull aryanondock/regulatory-rag:latest
            docker stop rag-container || true
            docker rm rag-container || true
            docker run -d -p 8000:8000 \
              --name rag-container \
              --env-file ~/ComplianceBrain-RAG/Backend/.env \
              --restart unless-stopped \
              aryanondock/regulatory-rag:latest