name: Deploy Regulatory RAG

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/regulatory-rag:latest .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/regulatory-rag:latest

    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/regulatory-rag:latest
          docker stop rag-container || true
          docker rm rag-container || true
          docker run -d --name rag-container -p 8501:8501 \
            -e NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }} \
            -e NVIDIA_REASONING=${{ secrets.NVIDIA_REASONING }} \
            -e QDRANT_URL=${{ secrets.QDRANT_URL }} \
            -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            -e QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }} \
            ${{ secrets.DOCKER_USERNAME }}/regulatory-rag:latest